  <line x1="270" y1="480" x2="1010" y2="480" stroke="#3a5a8c" stroke-width="4"/>
  <line x1="270" y1="505" x2="1010" y2="505" stroke="#b0492f" stroke-width="4"/>
  <!-- tie-point grid -->
  <g fill="#c9c4bb">
    <g id="dotrow">
      <circle cx="280" cy="290" r="4"/><circle cx="312" cy="290" r="4"/><circle cx="344" cy="290" r="4"/><circle cx="376" cy="290" r="4"/><circle cx="408" cy="290" r="4"/><circle cx="440" cy="290" r="4"/><circle cx="472" cy="290" r="4"/><circle cx="504" cy="290" r="4"/><circle cx="536" cy="290" r="4"/><circle cx="568" cy="290" r="4"/><circle cx="600" cy="290" r="4"/><circle cx="632" cy="290" r="4"/><circle cx="664" cy="290" r="4"/><circle cx="696" cy="290" r="4"/><circle cx="728" cy="290" r="4"/><circle cx="760" cy="290" r="4"/><circle cx="792" cy="290" r="4"/><circle cx="824" cy="290" r="4"/><circle cx="856" cy="290" r="4"/><circle cx="888" cy="290" r="4"/><circle cx="920" cy="290" r="4"/><circle cx="952" cy="290" r="4"/><circle cx="984" cy="290" r="4"/>
    </g>
    <use href="#dotrow" y="32"/>
    <use href="#dotrow" y="110"/>
    <use href="#dotrow" y="142"/>
  </g>
  <!-- ICs straddling the trench -->
  <rect x="340" y="330" width="150" height="60" rx="6" fill="#201d1a"/>
  <rect x="560" y="330" width="110" height="60" rx="6" fill="#201d1a"/>
  <rect x="740" y="330" width="180" height="60" rx="6" fill="#201d1a"/>
  <circle cx="356" cy="344" r="5" fill="#f1efeb"/>
  <circle cx="576" cy="344" r="5" fill="#f1efeb"/>
  <circle cx="756" cy="344" r="5" fill="#f1efeb"/>
  <!-- jumper wires -->
  <path d="M300 240 C 320 120, 500 120, 520 290" fill="none" stroke="#3a5a8c" stroke-width="6" stroke-linecap="round"/>
  <path d="M420 480 C 460 600, 700 600, 730 422" fill="none" stroke="#b0492f" stroke-width="6" stroke-linecap="round"/>
  <path d="M880 290 C 900 180, 1000 200, 990 240" fill="none" stroke="#5a7a4c" stroke-width="6" stroke-linecap="round"/>
  <!-- LEDs -->
  <g>
    <circle cx="640" cy="640" r="10" fill="#b0492f"/>
    <circle cx="676" cy="640" r="10" fill="#f1efeb" stroke="#c9c4bb" stroke-width="3"/>
    <circle cx="712" cy="640" r="10" fill="#b0492f"/>
    <circle cx="748" cy="640" r="10" fill="#b0492f"/>
    <circle cx="784" cy="640" r="10" fill="#f1efeb" stroke="#c9c4bb" stroke-width="3"/>
    <circle cx="820" cy="640" r="10" fill="#b0492f"/>
    <circle cx="856" cy="640" r="10" fill="#f1efeb" stroke="#c9c4bb" stroke-width="3"/>
    <circle cx="892" cy="640" r="10" fill="#b0492f"/>
  </g>
  <text x="240" y="652" font-family="Menlo, monospace" font-size="26" fill="#6b655f">out = 0xAD</text>
</svg>
