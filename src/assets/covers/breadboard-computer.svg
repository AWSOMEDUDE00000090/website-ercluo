<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f1efeb"/>
  <!-- breadboard body -->
  <rect x="240" y="180" width="800" height="360" rx="16" fill="#ffffff" stroke="#c9c4bb" stroke-width="3"/>
