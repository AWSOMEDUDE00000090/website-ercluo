<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" font-family="Menlo, monospace">
  <rect width="1200" height="800" fill="#f6f4f0"/>
  <g fill="none" stroke="#1b1917" stroke-width="3">
    <!-- bus spine -->
    <path d="M600 90 V710"/>
    <!-- modules hanging off the bus -->
    <rect x="180" y="120" width="280" height="110"/>
    <rect x="180" y="300" width="280" height="110"/>
    <rect x="180" y="480" width="280" height="110"/>
    <rect x="740" y="120" width="280" height="110"/>
    <rect x="740" y="300" width="280" height="110"/>
    <rect x="740" y="480" width="280" height="110"/>
    <!-- stubs to the bus -->
    <path d="M460 175 H600 M460 355 H600 M460 535 H600 M740 175 H600 M740 355 H600 M740 535 H600"/>
  </g>
  <!-- control lines in copper -->
  <g fill="none" stroke="#a84e24" stroke-width="2" stroke-dasharray="7 6">
    <path d="M320 230 V300 M320 410 V480 M880 230 V300 M880 410 V480"/>
  </g>
  <g fill="#1b1917" font-size="24">
    <text x="200" y="185">PC</text>
    <text x="200" y="365">A REG</text>
    <text x="200" y="545">ALU</text>
    <text x="760" y="185">RAM 16B</text>
    <text x="760" y="365">IR</text>
    <text x="760" y="545">OUT</text>
  </g>
  <text x="612" y="120" fill="#a84e24" font-size="22">BUS[7:0]</text>
  <!-- title block -->
  <g>
    <rect x="820" y="660" width="330" height="90" fill="none" stroke="#1b1917" stroke-width="2"/>
    <line x1="820" y1="690" x2="1150" y2="690" stroke="#1b1917" stroke-width="2"/>
    <text x="834" y="682" font-size="17" fill="#1b1917">SAP-1+ · 8-BIT DISCRETE CPU</text>
    <text x="834" y="720" font-size="15" fill="#6e675e">DWG 001 · 74LS · 14 BOARDS</text>
    <text x="834" y="740" font-size="15" fill="#6e675e">E.LUO · REV C</text>
  </g>
</svg>
