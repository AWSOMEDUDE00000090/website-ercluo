<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#201d1a"/>
  <!-- light beam -->
  <polygon points="560,360 1160,150 1160,570" fill="#f1efeb" opacity="0.12"/>
  <polygon points="560,360 1160,240 1160,480" fill="#f1efeb" opacity="0.16"/>
  <!-- funnel body (cross-section) -->
  <path d="M240 260 L 520 320 L 520 400 L 240 460 Z" fill="none" stroke="#f1efeb" stroke-width="5"/>
  <path d="M520 320 L 560 330 L 560 390 L 520 400 Z" fill="#3a5a8c" stroke="#f1efeb" stroke-width="4"/>
  <!-- flash head -->
  <rect x="120" y="240" width="120" height="240" rx="14" fill="none" stroke="#f1efeb" stroke-width="5"/>
  <line x1="150" y1="280" x2="150" y2="440" stroke="#f1efeb" stroke-width="3" opacity="0.5"/>
  <line x1="180" y1="280" x2="180" y2="440" stroke="#f1efeb" stroke-width="3" opacity="0.5"/>
  <line x1="210" y1="280" x2="210" y2="440" stroke="#f1efeb" stroke-width="3" opacity="0.5"/>
  <!-- dimension lines -->
  <g stroke="#6b655f" stroke-width="2">
    <line x1="240" y1="520" x2="520" y2="520"/>
    <line x1="240" y1="510" x2="240" y2="530"/>
    <line x1="520" y1="510" x2="520" y2="530"/>
  </g>
  <text x="352" y="552" font-family="Menlo, monospace" font-size="24" fill="#a19b92">140 mm</text>
  <g stroke="#6b655f" stroke-width="2">
    <line x1="600" y1="330" x2="600" y2="390"/>
    <line x1="590" y1="330" x2="610" y2="330"/>
    <line x1="590" y1="390" x2="610" y2="390"/>
  </g>
  <text x="622" y="368" font-family="Menlo, monospace" font-size="24" fill="#a19b92">ø46</text>
</svg>
