<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#201d1a"/>
  <!-- stepper motor face -->
  <rect x="220" y="200" width="320" height="320" rx="40" fill="none" stroke="#f1efeb" stroke-width="5"/>
  <circle cx="380" cy="360" r="110" fill="none" stroke="#f1efeb" stroke-width="5"/>
  <circle cx="380" cy="360" r="26" fill="#f1efeb"/>
  <circle cx="252" cy="232" r="10" fill="none" stroke="#6b655f" stroke-width="3"/>
  <circle cx="508" cy="232" r="10" fill="none" stroke="#6b655f" stroke-width="3"/>
  <circle cx="252" cy="488" r="10" fill="none" stroke="#6b655f" stroke-width="3"/>
  <circle cx="508" cy="488" r="10" fill="none" stroke="#6b655f" stroke-width="3"/>
  <!-- square wave out -->
  <path d="M600 360 h40 v-90 h60 v90 h60 v-140 h60 v140 h60 v-60 h60 v60 h60 v-110 h60 v110 h60"
