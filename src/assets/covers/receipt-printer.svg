<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" font-family="Menlo, monospace">
  <rect width="1200" height="800" fill="#f6f4f0"/>
  <g fill="none" stroke="#1b1917" stroke-width="3">
    <!-- phone -->
    <rect x="120" y="280" width="130" height="240" rx="14"/>
    <!-- esp32 board -->
    <rect x="480" y="330" width="220" height="140"/>
    <!-- printer -->
    <rect x="920" y="300" width="180" height="200"/>
    <path d="M950 300 V240 H1070 V300" stroke-dasharray="5 6"/>
  </g>
  <!-- receipt strip -->
  <g stroke="#1b1917" stroke-width="2" fill="none">
    <path d="M950 240 H1070 M950 240 L958 228 L966 240 L974 228 L982 240 L990 228 L998 240 L1006 228 L1014 240 L1022 228 L1030 240 L1038 228 L1046 240 L1054 228 L1062 240 L1070 228"/>
  </g>
  <!-- signal path in copper -->
  <g fill="none" stroke="#a84e24" stroke-width="2.5">
    <path d="M250 400 C 330 400, 390 400, 480 400" stroke-dasharray="2 8" stroke-linecap="round"/>
    <path d="M700 400 H920"/>
  </g>
  <g fill="#a84e24" font-size="17">
    <text x="310" y="380">HTTP / WI-FI</text>
    <text x="740" y="380">RS-232</text>
  </g>
  <g fill="#1b1917" font-size="20">
    <text x="140" y="550">PHONE</text>
    <text x="500" y="500">ESP32 + MAX3232</text>
    <text x="940" y="530">TM-T88</text>
  </g>
  <!-- pin callouts -->
  <g fill="#6e675e" font-size="15">
    <text x="500" y="320">TX2 → T1IN</text>
    <text x="620" y="320">DTR ← R1OUT</text>
  </g>
  <!-- title block -->
  <g>
    <rect x="820" y="660" width="330" height="90" fill="none" stroke="#1b1917" stroke-width="2"/>
    <line x1="820" y1="690" x2="1150" y2="690" stroke="#1b1917" stroke-width="2"/>
    <text x="834" y="682" font-size="17" fill="#1b1917">LAN RECEIPT PRINTER · TOPOLOGY</text>
    <text x="834" y="720" font-size="15" fill="#6e675e">ESC/POS · 38400 8N1 · DTR FLOW</text>
    <text x="834" y="740" font-size="15" fill="#6e675e">E.LUO · REV B</text>
  </g>
</svg>
