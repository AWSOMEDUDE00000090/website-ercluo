    <rect x="640" y="300" width="36" height="36" opacity="0.7"/>
    <rect x="710" y="260" width="36" height="36" opacity="0.45"/>
    <rect x="700" y="360" width="36" height="36" opacity="0.55"/>
    <rect x="770" y="330" width="36" height="36" opacity="0.3"/>
    <rect x="760" y="430" width="36" height="36" opacity="0.4"/>
    <rect x="830" y="400" width="36" height="36" opacity="0.25"/>
    <rect x="820" y="250" width="36" height="36" opacity="0.3"/>
    <rect x="890" y="300" width="36" height="36" opacity="0.2"/>
    <rect x="880" y="460" width="36" height="36" opacity="0.18"/>
    <rect x="950" y="380" width="36" height="36" opacity="0.15"/>
