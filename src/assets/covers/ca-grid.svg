<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f1efeb"/>
  <!-- a glyph "E" dissolving into grid cells, left crisp, right dispersing -->
  <g fill="#201d1a">
    <rect x="360" y="200" width="36" height="36"/><rect x="400" y="200" width="36" height="36"/><rect x="440" y="200" width="36" height="36"/><rect x="480" y="200" width="36" height="36"/><rect x="520" y="200" width="36" height="36"/>
    <rect x="360" y="240" width="36" height="36"/>
    <rect x="360" y="280" width="36" height="36"/>
    <rect x="360" y="320" width="36" height="36"/><rect x="400" y="320" width="36" height="36"/><rect x="440" y="320" width="36" height="36"/><rect x="480" y="320" width="36" height="36"/>
    <rect x="360" y="360" width="36" height="36"/>
    <rect x="360" y="400" width="36" height="36"/>
    <rect x="360" y="440" width="36" height="36"/><rect x="400" y="440" width="36" height="36"/><rect x="440" y="440" width="36" height="36"/><rect x="480" y="440" width="36" height="36"/><rect x="520" y="440" width="36" height="36"/>
  </g>
